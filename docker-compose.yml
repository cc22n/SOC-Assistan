services:
  # ===========================================
  # SOC Agent - Flask App
  # ===========================================
  app:
    build: .
    container_name: soc-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    # .env.docker: copia .env.example y define al menos SECRET_KEY (>=32 chars)
    # y las API keys que tengas. Las variables de abajo tienen prioridad sobre
    # el env_file, así que DATABASE_URL/REDIS_URL siempre apuntan a los servicios.
    env_file:
      - path: .env.docker
        required: false
    # En produccion, sobreescribe POSTGRES_PASSWORD via .env.docker o una
    # variable de entorno del host — no dejes el default de desarrollo.
    environment:
      - DATABASE_URL=postgresql://soc_admin:${POSTGRES_PASSWORD:-soc_secure_password}@db:5432/soc_agent
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - soc-network

  # ===========================================
  # PostgreSQL
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: soc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soc_agent
      POSTGRES_USER: soc_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_secure_password}
    # Publicar solo para debug local (psql desde el host). En produccion, no exponer.
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_admin -d soc_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # ===========================================
  # Redis (health check / cache opcional)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

volumes:
  postgres_data:
  redis_data:
  app_logs:

networks:
  soc-network:
    driver: bridge

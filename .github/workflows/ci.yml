name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: soc_admin
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: soc_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U soc_admin -d soc_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.0.2

      # Migracion base (migrations/versions/) crea el esquema completo,
      # incluida la extension pg_trgm que requiere el indice GIN de IOC.value.
      # Sirve ademas como chequeo de regresion: valida en cada push que la
      # migracion aplica limpio contra una BD Postgres vacia.
      - name: Apply database migrations
        env:
          FLASK_APP: wsgi.py
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://soc_admin:1234@localhost:5432/soc_agent_test?client_encoding=utf8
        run: flask db upgrade

      - name: Run unit tests
        env:
          FLASK_ENV: testing
          TEST_DATABASE_URL: postgresql://soc_admin:1234@localhost:5432/soc_agent_test?client_encoding=utf8
        run: python -m pytest tests/unit -q
